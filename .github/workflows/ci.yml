name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: termini
          POSTGRES_PASSWORD: termini
          POSTGRES_DB: termini_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U termini -d termini_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://termini:termini@localhost:5432/termini_db
      SECRET_KEY: test-secret-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ruff
        run: ruff check .

      - name: Run black check
        run: black --check .

      - name: Run tests
        run: pytest
