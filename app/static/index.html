<!doctype html>
<html lang="hr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Termini konzultacija</title>
  <script>
    (function () {
      var key = "theme";
      var theme = localStorage.getItem(key);
      if (theme !== "dark" && theme !== "light") {
        theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css?v=osoba2" />
  <link rel="stylesheet" href="/static/termini_admin.css?v=osoba3" />
  <script defer src="/static/script.js?v=osoba2"></script>
  <script defer src="/static/termini_admin.js?v=osoba3"></script>
</head>

<body>
  <header class="navbar">
    <div class="navbar-brand">
      <span class="brand-icon">📅</span>
      <strong>Termini konzultacija</strong>
    </div>

    <nav aria-label="Glavna navigacija">
      <a href="/docs" target="_blank" rel="noreferrer">Swagger ↗</a>
      <button id="health-button" type="button" class="btn-nav">🔍 Health</button>
    </nav>

    <div class="navbar-user">
      <span id="navbar-role-badge" class="role-badge" style="display:none"></span>
      <span id="navbar-current-user" class="user-pill">Niste prijavljeni</span>
      <button id="theme-toggle" type="button" class="btn-theme" aria-label="Tamna tema" title="Tamna tema">🌙</button>
      <button id="logout-button" type="button" class="btn-logout" style="display:none">Odjava</button>
    </div>
  </header>

  <div id="health-bar" class="health-bar" style="display:none">
    <pre id="health-result"></pre>
  </div>

  <main class="container">
    <!-- Auth forme — skrivene kad termini_admin.js preuzme kontrolu -->
    <div id="auth-forms-placeholder" style="display:none">
      <form id="register-form"></form>
      <form id="login-form"></form>
      <div id="current-user"></div>
    </div>
    <!-- termini_admin.js preuzima kontrolu i renderira UI ovisno o roli -->
  </main>

  <p id="script-status" style="display:none"></p>
</body>

</html>
