services:
  db:
    image: postgres:16
    container_name: termini_postgres
    environment:
      POSTGRES_USER: termini
      POSTGRES_PASSWORD: termini
      POSTGRES_DB: termini_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U termini -d termini_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: termini_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://termini:termini@db:5432/termini_db
      SECRET_KEY: CHANGE_ME_IN_PRODUCTION
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
